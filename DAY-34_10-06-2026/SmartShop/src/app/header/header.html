@if (user) {
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
  <div class="container-fluid px-3 px-md-4">
    <a class="navbar-brand fw-bold" routerLink="/dashboard">SmartShop</a>

    <div class="d-flex align-items-center gap-2 ms-auto">
      <a class="btn btn-outline-light btn-sm" routerLink="/dashboard">Dashboard</a>
      <a class="btn btn-outline-light btn-sm" routerLink="/products">Products</a>
      <a class="btn btn-outline-light btn-sm" routerLink="/profile">Profile</a>

      <span class="text-light fw-semibold d-none d-md-inline ms-2 me-2">Hello, {{ user.firstName || user.username }}</span>

      <button class="btn btn-light btn-sm" type="button" (click)="logout()">Logout</button>
    </div>
  </div>
</nav>
}
