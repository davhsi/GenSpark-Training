<nav class="navbar navbar-expand-lg sticky-top" [class.scrolled]="isScrolled">
  <div class="container">
    <a class="navbar-brand" routerLink="/">Busly</a>

    <button
      class="navbar-toggler border-0"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarNav"
      aria-controls="navbarNav"
      aria-expanded="false"
      aria-label="Toggle navigation"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto align-items-center gap-1">
        <li class="nav-item">
          <a class="nav-link" routerLink="/search" routerLinkActive="active">Search</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/pnr-check" routerLinkActive="active">PNR Check</a>
        </li>

        <ng-container *ngIf="authService.currentUser$ | async as user; else guestLinks">
          <li class="nav-item" *ngIf="user.role === 'Customer'">
            <a class="nav-link" routerLink="/my-bookings" routerLinkActive="active">My Bookings</a>
          </li>
          <li class="nav-item" *ngIf="user.role === 'Admin'">
            <a class="nav-link" routerLink="/admin" routerLinkActive="active">Admin Panel</a>
          </li>
          <li class="nav-item" *ngIf="user.role === 'Operator'">
            <a class="nav-link" routerLink="/operator" routerLinkActive="active">Operator Hub</a>
          </li>
          <li class="nav-item ms-lg-2">
            <div class="dropdown">
              <button
                class="btn btn-link nav-link dropdown-toggle px-3 border-0"
                type="button"
                id="userMenu"
                data-bs-toggle="dropdown"
                aria-expanded="false"
              >
                {{ user.email }}
              </button>
              <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userMenu">
                <li>
                  <button class="dropdown-item py-2" (click)="onLogout()">
                    <i class="bi bi-box-arrow-right me-2"></i>Logout
                  </button>
                </li>
              </ul>
            </div>
          </li>
        </ng-container>

        <ng-template #guestLinks>
          <li class="nav-item">
            <a class="nav-link" routerLink="/login">Login</a>
          </li>
          <li class="nav-item ms-lg-2">
            <a class="btn btn-register" routerLink="/register">Register</a>
          </li>
        </ng-template>
      </ul>
    </div>
  </div>
</nav>
