<!-- Light page background -->
<div style="
  min-height: 100vh;
  background: var(--gray-50);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem 1rem;
">

  <!-- Login Card -->
  <div class="animate-fade-up" style="width: 100%; max-width: 480px;">
    <div style="
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-card);
      overflow: hidden;
    ">

      <!-- Card Header — clean blue -->
      <div style="
        background: var(--blue);
        padding: 2.25rem 2rem 2rem;
        text-align: center;
      ">
        <div style="font-size: 1.75rem; font-weight: 800; color: var(--white); letter-spacing: -0.03em; margin-bottom: 0.375rem;">
          Busly
        </div>
        <h2 style="
          font-family: var(--font-display);
          font-size: 1.375rem;
          font-weight: 600;
          color: rgba(255,255,255,0.92);
          margin: 0 0 0.375rem;
        ">Welcome back</h2>
        <p style="color: rgba(255,255,255,0.7); margin: 0; font-size: 0.875rem;">
          Sign in to manage your journey
        </p>
      </div>

      <!-- Card Body -->
      <div style="padding: 2rem;">

        <!-- Error -->
        <div *ngIf="errorMessage" class="alert alert-danger d-flex align-items-center mb-4" role="alert">
          <i class="bi bi-exclamation-triangle-fill me-2"></i>
          <div>{{ errorMessage }}</div>
        </div>

        <!-- Success -->
        <div *ngIf="successMessage" class="alert alert-success d-flex align-items-center mb-4" role="alert">
          <i class="bi bi-check-circle-fill me-2"></i>
          <div>{{ successMessage }}</div>
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>

          <!-- Email -->
          <div class="mb-4">
            <label for="email" class="form-label">
              <i class="bi bi-envelope me-1" style="color: var(--blue);"></i>Email address
            </label>
            <input
              id="email"
              type="email"
              class="form-control"
              [class.is-invalid]="email.invalid && email.touched"
              formControlName="email"
              placeholder="you@example.com"
              autocomplete="email"
            />
            <div class="invalid-feedback">
              <span *ngIf="email.errors?.['required']">Email is required.</span>
              <span *ngIf="email.errors?.['email']">Please enter a valid email address.</span>
            </div>
          </div>

          <!-- Password -->
          <div class="mb-5">
            <label for="password" class="form-label">
              <i class="bi bi-lock me-1" style="color: var(--blue);"></i>Password
            </label>
            <input
              id="password"
              type="password"
              class="form-control"
              [class.is-invalid]="password.invalid && password.touched"
              formControlName="password"
              placeholder="••••••••"
              autocomplete="current-password"
            />
            <div class="invalid-feedback">
              <span *ngIf="password.errors?.['required']">Password is required.</span>
            </div>
          </div>

          <!-- Sign In Button -->
          <button
            type="submit"
            class="btn btn-amber"
            [disabled]="isLoading"
          >
            <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
            {{ isLoading ? 'Signing in…' : 'Sign In' }}
          </button>

        </form>

        <div class="text-center mt-4">
          <p style="color: var(--gray-500); font-size: 0.875rem; margin: 0;">
            Don't have an account?
            <a routerLink="/register"
               style="color: var(--blue); font-weight: 600; text-decoration: none;">
              Create Account
            </a>
          </p>
        </div>

      </div>
    </div>
  </div>
</div>
