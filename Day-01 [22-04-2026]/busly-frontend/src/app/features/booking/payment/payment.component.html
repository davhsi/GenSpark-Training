<div class="container d-flex justify-content-center align-items-center min-vh-100">
  <div class="card shadow-sm" style="width: 100%; max-width: 480px;">
    <div class="card-body p-4">

      <h2 class="card-title text-center mb-4">Payment</h2>

      <!-- Error alert -->
      <div *ngIf="errorMessage" class="alert alert-danger" role="alert">
        {{ errorMessage }}
      </div>

      <form [formGroup]="paymentForm" (ngSubmit)="onPay()" novalidate>

        <!-- Card Number -->
        <div class="mb-3">
          <label for="cardNumber" class="form-label">Card Number</label>
          <input
            id="cardNumber"
            type="text"
            class="form-control"
            [class.is-invalid]="cardNumber.invalid && cardNumber.touched"
            formControlName="cardNumber"
            placeholder="1234 5678 9012 3456"
            autocomplete="cc-number"
          />
          <div class="invalid-feedback">Card number is required.</div>
        </div>

        <div class="row g-3 mb-4">

          <!-- Expiry -->
          <div class="col-7">
            <label for="expiry" class="form-label">Expiry Date</label>
            <input
              id="expiry"
              type="text"
              class="form-control"
              [class.is-invalid]="expiry.invalid && expiry.touched"
              formControlName="expiry"
              placeholder="MM / YY"
              autocomplete="cc-exp"
            />
            <div class="invalid-feedback">Expiry date is required.</div>
          </div>

          <!-- CVV -->
          <div class="col-5">
            <label for="cvv" class="form-label">CVV</label>
            <input
              id="cvv"
              type="text"
              class="form-control"
              [class.is-invalid]="cvv.invalid && cvv.touched"
              formControlName="cvv"
              placeholder="•••"
              autocomplete="cc-csc"
            />
            <div class="invalid-feedback">CVV is required.</div>
          </div>

        </div>

        <!-- Pay Now -->
        <button
          type="submit"
          class="btn btn-success w-100"
          [disabled]="isLoading"
        >
          <span
            *ngIf="isLoading"
            class="spinner-border spinner-border-sm me-2"
            role="status"
            aria-hidden="true"
          ></span>
          {{ isLoading ? 'Processing payment…' : 'Pay Now' }}
        </button>

      </form>

      <p class="text-center text-muted small mt-3 mb-0">
        <i class="bi bi-lock-fill me-1"></i>
        This is a demo payment form. No real transaction will occur.
      </p>

    </div>
  </div>
</div>
